{% extends "base.html" %}
{% block title %}
    <title>About</title>
        <style>

        .gallery-container {
            padding: 60px 0;
            width: 100%;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            aspect-ratio: 1 / 1; /* บังคับให้เป็นสี่เหลี่ยมจัตุรัส */
            margin-bottom: 20px; /* ระยะห่างด้านล่างสำหรับจอเล็ก */
        }

        /* เอฟเฟกต์เมื่อ Hover ที่ตัว Item */
        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.7);
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ปรับภาพให้พอดีพื้นที่โดยไม่เสียสัดส่วน */
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.1); /* ขยายภาพเล็กน้อย */
        }

        /* ปรับแต่ง Bootstrap Tooltip */
        .tooltip-inner {
            background-color: #fff !important;
            color: #000 !important;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 8px;
            padding: 10px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .bs-tooltip-top .tooltip-arrow::before,
        .bs-tooltip-auto[data-popper-placement^=top] .tooltip-arrow::before {
            border-top-color: #fff !important;
        }

    </style>
{% endblock %}
{% block page_title %}
[<span style="color: red;">About</span>]
{% endblock %}
