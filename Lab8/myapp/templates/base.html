<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}

    {% endblock %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <!-- Menu bar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background-color: #776ed5;">
        <div class="container-fluid">
            <a class="navbar-brand text-white fw-bold" style="font-size: 1.8rem;" href="/">Sakolwan 68071947</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon text-white" ></span>
                </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active text-white fw-bold" style="font-size: 1.2rem;" aria-current="page" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white fw-bold" style="font-size: 1.2rem;" href="/about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white fw-bold" style="font-size: 1.2rem;" href="/form">Form</a>
                    </li>        
                </ul>
            </div>
        </div>
    </nav>
    <!-- Banner -->
    <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active position-relative">
                <img src="https://cdn.prod.website-files.com/6331c6bbc21f6fa6209a8597/66543555592db95f18a9c7e3_ba0eb82dbe74fb21925083c2ea7475b4%20(2)%20(1).jpg" style="width: 100%; height: 100vh; overflow: hidden;"  alt="...">
                <div class="carousel-caption d-flex flex-column justify-content-center align-items-center w-100 h-100 position-absolute top-0 start-0">
                    <div class="text-center" style="padding: 2%; border-radius: 15px; background-color: rgba(0, 0, 0, 0.8);">
                        <h1 class="display-4 fw-bold text-white text-shadow">Welcome to my website 
                            {% block page_title %}
                            {% endblock %}
                        </h1>
                        <p class="lead text-white text-shadow" style="font-weight: bolder;">ICT12367 การใช้กรอบงานสำหรับการพัฒนาเว็บแอปพลิเคชั่นเพื่อความมั่นคงปลอดภัย</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <br>
    <div>
        {% block content %}
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5 fixed-bottom">
        <div class="container">
            <p class="mb-0">&copy; 2026 ICT12367 SPU | Sakolwan Srikhammoon |</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
