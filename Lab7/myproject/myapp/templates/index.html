<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หน้าแรก</title>

  <style>
    :root{
      --bg: #eee7e7;
      --card-bg: #ffffff;
      --text: #111827;
      --shadow: 0 12px 28px rgba(0,0,0,.10);
      --radius: 18px;
      --btn: #1f9d3a;
      --btn-hover: #178a31;
    }

    *{ box-sizing: border-box; }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page{
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 16px;
    }

    .card{
      width: min(700px, 100%);
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 56px;
      text-align: center;
    }

    h1{
      margin: 0 0 12px;
      font-size: 40px;
      font-weight: 800;
      color: #2f3a4a;
    }

    p{
      margin-bottom: 30px;
      font-size: 18px;
      color: #4b5563;
    }

    .btn{
      display: inline-block;
      padding: 14px 26px;
      margin: 8px;
      border-radius: 8px;
      background: var(--btn);
      color: white;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none;
    }

    .btn:hover{
      background: var(--btn-hover);
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <h1>เว็บไซต์วิชา ICT12367 SPU</h1>
      <p>ระบบบันทึกข้อมูลพนักงาน</p>

      <a href="{% url 'myapp:form' %}" class="btn">บันทึกข้อมูลพนักงาน</a>
      <a href="{% url 'myapp:about' %}" class="btn">เกี่ยวกับเรา</a>
      <a href="{% url 'myapp:contact' %}" class="btn">ติดต่อ</a>

    </div>
  </div>
</body>
</html>
