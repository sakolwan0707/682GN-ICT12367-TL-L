{% extends 'base.html' %}

{% block title %}
    <title>Login - H2O</title>
{% endblock %}

{% block content %}

    <div class="container" style="margin-top: 100px; max-width: 400px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h3 class="text-center mb-4" style="color: var(--latte-main);">Staff Login</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">รหัสพนักงาน (Employee ID)</label>
                    <input type="text" name="employee_id" class="form-control" placeholder="กรูณากรอกรหัสพนักงาน" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">รหัสผ่าน (Password)</label>
                    <input type="password" name="password" class="form-control" placeholder="กรุณากรอกรหัสผ่าน" required>
                </div>
                
                <div class="text-center">
                    <button type="submit" class="btn text-white px-4 py-2" style="background-color: var(--latte-main); border-radius: 12px;">
                        เข้าสู่ระบบ
                    </button>
                </div>
            </form>
        </div>
    </div>
    <div class="text-center mt-3">
        <small class="text-muted">สำหรับพนักงานร้าน H2O Cafe เท่านั้น</small>
    </div>
</div>
    
{% endblock %}

{% block script%}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    {% if messages %}
        {% for message in messages %}
            Swal.fire({
                icon: 'error',
                title: 'เข้าสู่ระบบไม่สำเร็จ',
                text: '{{ message }}',
                confirmButtonColor: '#C2A385'
            });
        {% endfor %}
    {% endif %}
</script>
{% endblock %}
